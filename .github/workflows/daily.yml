name: Gerar haikai diário

on:
  schedule:
    - cron: "0 2 * * *"   # meia-noite horário de Brasília (UTC-3)
    - cron: "0 14 * * *"  # meio-dia horário de Brasília (UTC-3)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar haikai
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Commit e push se houve mudança
        run: |
          git config user.name "haikai-bot"
          git config user.email "bot@haikai-diario.com"
          git add data/haikais.json
          git diff --staged --quiet || git commit -m "haikai: $(date +'%Y-%m-%d %H:%M')"
          git push
